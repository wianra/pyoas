openapi: "3.0.3"
info:
  title: Multi-Tag API
  version: "1.0.0"
tags:
  - name: users
  - name: orders

paths:
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The requested user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: The requested order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    # Shared — referenced by both users and orders
    Address:
      type: object
      description: A postal address (shared schema)
      properties:
        street:
          type: string
        city:
          type: string
        country:
          type: string

    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        address:
          $ref: "#/components/schemas/Address"

    Order:
      type: object
      required: [id, userId, total]
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        userId:
          type: string
          format: uuid
        total:
          type: number
          format: double
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
          default: pending
        shippingAddress:
          $ref: "#/components/schemas/Address"
