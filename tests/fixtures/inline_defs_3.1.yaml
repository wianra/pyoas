openapi: "3.1.0"
info:
  title: Inline Defs Test
  version: "1.0.0"
tags:
  - name: pets
  - name: orders

paths:
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    Pet:
      type: object
      $defs:
        # Tag-local: only Pet references this
        PetStatus:
          type: string
          enum: [active, retired, lost]
        # Tag-local: only Pet references this
        Tag:
          type: object
          properties:
            name:
              type: string
            value:
              type: string
        # Shared: both Pet and Order reference this
        Label:
          type: object
          required: [key]
          properties:
            key:
              type: string
            display:
              type: string
      required:
        - name
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/Pet/$defs/PetStatus"
        tag:
          $ref: "#/components/schemas/Pet/$defs/Tag"
        label:
          $ref: "#/components/schemas/Pet/$defs/Label"

    Order:
      type: object
      required:
        - id
        - amount
      properties:
        id:
          type: integer
          format: int64
        amount:
          type: number
          format: double
        label:
          $ref: "#/components/schemas/Pet/$defs/Label"
