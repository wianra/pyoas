openapi: "3.0.0"
info:
  title: Form Upload API
  version: "1.0"
paths:
  /upload:
    post:
      operationId: uploadFile
      tags: [files]
      summary: Upload a file with metadata
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                name:
                  type: string
                  description: Display name for the file
                description:
                  type: string
                  description: Optional description
      responses:
        "200":
          description: Upload successful
  /form:
    post:
      operationId: submitForm
      tags: [files]
      summary: Submit a form
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username]
              properties:
                username:
                  type: string
                age:
                  type: integer
      responses:
        "200":
          description: Form submitted
  /upload-opaque:
    post:
      operationId: uploadOpaque
      tags: [files]
      summary: Upload with opaque form body (no properties listed)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              # Intentionally no properties — opaque form body
      responses:
        "200":
          description: Uploaded
  /upload-ref:
    post:
      operationId: uploadRef
      tags: [files]
      summary: Upload with a $ref form schema that has no properties
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/OpaqueUpload"
      responses:
        "200":
          description: Uploaded
components:
  schemas:
    OpaqueUpload:
      type: object
      # No properties — resolved schema will also lack properties
      description: An opaque upload body
