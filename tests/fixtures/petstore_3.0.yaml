openapi: "3.0.3"
info:
  title: Petstore
  version: "1.0.0"
tags:
  - name: pets
    description: Pet operations
  - name: store
    description: Store operations

paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      tags: [pets]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetList"
    post:
      summary: Create a pet
      operationId: createPet
      tags: [pets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: Created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /pets/{petId}:
    get:
      summary: Get a pet by ID
      operationId: getPet
      tags: [pets]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: The requested pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /store/inventory:
    get:
      summary: Get store inventory
      operationId: getInventory
      tags: [store]
      responses:
        "200":
          description: Inventory counts by status
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer

components:
  schemas:
    Pet:
      type: object
      description: A pet in the store
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
          description: The pet's name
        tag:
          type: string
          nullable: true
        status:
          type: string
          enum: [available, pending, sold]
          default: available

    PetList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Pet"
        total:
          type: integer

    CreatePetRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        tag:
          type: string
          nullable: true
