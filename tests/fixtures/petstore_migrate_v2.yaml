components:
  schemas:
    CreatePetRequest:
      properties:
        name:
          type: string
        tag:
          nullable: true
          type: string
      required:
      - name
      - tag
      type: object
    Pet:
      description: A pet in the store
      properties:
        breed:
          type: string
        id:
          format: int64
          readOnly: true
          type: integer
        name:
          description: The pet's name
          type: string
        status:
          default: available
          enum:
          - available
          - pending
          - sold
          type: string
        tag:
          type: string
      required:
      - id
      - name
      type: object
    PetList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/Pet'
          type: array
        total:
          type: integer
      required:
      - items
      type: object
info:
  title: Petstore
  version: 1.0.0
openapi: 3.0.3
paths:
  /pets:
    get:
      operationId: listPets
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          maximum: 100
          minimum: 1
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetList'
          description: A list of pets
      summary: List all pets
      tags:
      - Pets
    post:
      operationId: createPet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePetRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
          description: Created pet
      summary: Create a pet
      tags:
      - Pets
  /pets/search:
    get:
      operationId: searchPets
      parameters:
      - in: query
        name: q
        required: false
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetList'
          description: Matching pets
      summary: Search pets by keyword
      tags:
      - Pets
  /store/inventory:
    get:
      operationId: getInventory
      responses:
        '200':
          content:
            application/json:
              schema:
                additionalProperties:
                  type: integer
                type: object
          description: Inventory counts by status
      summary: Get store inventory
      tags:
      - Store
tags:
- description: Pet operations
  name: Pets
- description: Store operations
  name: Store
