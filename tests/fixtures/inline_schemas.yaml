openapi: "3.0.0"
info:
  title: Inline Schema API
  version: "1.0"
paths:
  /reports:
    post:
      operationId: createReport
      tags: [reports]
      summary: Create a report with an inline request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                max_rows:
                  type: integer
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                type: object
                required: [id, title]
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  created_at:
                    type: string
                    format: date-time
