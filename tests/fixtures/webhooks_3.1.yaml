openapi: "3.1.0"
info:
  title: Subscriptions with Webhooks
  version: "1.0.0"
tags:
  - name: subscriptions
    description: Subscription operations

paths:
  /subscriptions:
    post:
      summary: Create a subscription
      operationId: createSubscription
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

webhooks:
  onSubscriptionEvent:
    post:
      summary: Subscription event callback
      operationId: onSubscriptionEvent
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionEvent"
      responses:
        "200":
          description: Webhook received successfully

components:
  schemas:
    Subscription:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        status:
          type: string
          enum: [active, cancelled, expired]

    CreateSubscriptionRequest:
      type: object
      required:
        - plan
      properties:
        plan:
          type: string

    SubscriptionEvent:
      type: object
      required:
        - subscription_id
        - event_type
      properties:
        subscription_id:
          type: integer
          format: int64
        event_type:
          type: string
          enum: [created, cancelled, expired]
