default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12  # Use the latest stable version
    hooks:
      - id: ruff
        args: [--fix]
        exclude: \.ambr$
      - id: ruff-format
        exclude: \.ambr$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: \.ambr$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: debug-statements  # catches stray print() / pdb

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        exclude: (^|.*/)tests/
        additional_dependencies: [
            "types-PyYAML",
        ]
        args: [ "--ignore-missing-imports" ]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        exclude: (^|.*/)tests/
        args: [ "-q" ]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [ commit-msg ]
